<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solution Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230066cc'/><text x='16' y='22' font-family='system-ui,sans-serif' font-size='16' font-weight='700' fill='white' text-anchor='middle'>SA</text></svg>">
  <!-- D2: Prevent theme flash before CSS loads -->
  <script>(function(){ var t=localStorage.getItem('theme'); if(t==='dark') document.documentElement.setAttribute('data-theme','dark'); })();</script>
  <!-- D2: Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* D1: Light theme (default) */
    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f8;
      --bg-sidebar: #f0f0f5;
      --bg-input: #f3f4f6;
      --bg-user-msg: #0066cc;
      --bg-hover: #e8e8f0;
      --text-primary: #1a1a1a;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --accent: #0066cc;
      --accent-hover: #0052a3;
      --danger: #dc2626;
      --warning: #d97706;
      --success: #16a34a;
      --code-bg: #f6f8fa;
      --code-bg-header: #eaeef2;
      --radius: 12px;
    }

    /* D1: Dark theme overrides */
    [data-theme="dark"] {
      --bg: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-sidebar: #0f1629;
      --bg-input: #1e2a4a;
      --bg-user-msg: #2563eb;
      --bg-hover: #1e2a4a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #1e293b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #22c55e;
      --code-bg: #0d1117;
      --code-bg-header: #161b22;
    }

    html, body { height: 100%; }
    /* D2: Inter font */
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      display: flex;
      overflow: hidden;
    }

    /* ─── Sidebar ─────────────────────────────── */
    .sidebar {
      width: 260px; min-width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100vh;
    }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; letter-spacing: 0.6px; text-transform: uppercase; }
    .new-chat-btn { width: 100%; padding: 9px 14px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; font-family: inherit; }
    .new-chat-btn:hover { background: var(--accent-hover); }
    .conv-list { flex: 1; overflow-y: auto; padding: 6px; }
    .conv-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; transition: background 0.1s; }
    .conv-item:hover { background: var(--bg-hover); }
    .conv-item.active { background: var(--bg-hover); }
    .conv-item-text { flex: 1; min-width: 0; }
    .conv-item-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); font-weight: 500; }
    .conv-item-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .conv-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s; font-size: 14px; }
    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-delete:hover { color: var(--danger); }

    /* ─── Main Area ───────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; background: var(--bg); }

    /* D1/D2: Chat header bar */
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .chat-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 5px 10px; cursor: pointer; font-size: 15px;
      color: var(--text-secondary); transition: background 0.15s, border-color 0.15s;
      line-height: 1;
    }
    .theme-toggle:hover { background: var(--bg-secondary); border-color: var(--accent); }

    /* D3: Phase indicator bar */
    .phase-bar {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 7px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 500;
      flex-shrink: 0;
    }
    .phase-step { display: flex; align-items: center; gap: 5px; color: var(--text-muted); transition: color 0.25s; }
    .phase-step.active { color: var(--accent); }
    .phase-step.done { color: var(--success); }
    .phase-dot { font-size: 9px; }
    .phase-sep { color: var(--border); font-size: 13px; }

    .messages { flex: 1; overflow-y: auto; padding: 24px 0; }
    .messages-inner { max-width: 800px; margin: 0 auto; padding: 0 24px; }

    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 40px; }
    .welcome h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
    .welcome p { font-size: 14px; max-width: 440px; line-height: 1.65; color: var(--text-secondary); }

    /* D7: Message layout */
    .message { margin-bottom: 20px; display: flex; flex-direction: column; }
    .message-role { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; color: var(--text-muted); }
    /* D7: no borders, just background + padding */
    .message-bubble { padding: 13px 17px; border-radius: var(--radius); line-height: 1.65; font-size: 14px; }
    /* D7: user — right-aligned, max 65% */
    .message.user { align-items: flex-end; }
    .message.user .message-bubble { background: var(--bg-user-msg); color: white; max-width: 65%; }
    /* D7: agent — full width, no border */
    .message.assistant .message-bubble { background: var(--bg); }
    .message.error .message-bubble { background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.2); color: var(--danger); }

    /* Markdown styles */
    .message-bubble h1, .message-bubble h2, .message-bubble h3 { margin: 16px 0 8px; line-height: 1.3; color: var(--text-primary); }
    .message-bubble h1 { font-size: 17px; } .message-bubble h2 { font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 4px; } .message-bubble h3 { font-size: 14px; font-weight: 600; }
    .message-bubble p { margin: 8px 0; }
    .message-bubble ul, .message-bubble ol { margin: 8px 0; padding-left: 22px; }
    .message-bubble li { margin: 4px 0; }
    /* D2: code font */
    .message-bubble code { background: rgba(0,0,0,0.06); color: var(--text-primary); padding: 2px 6px; border-radius: 4px; font-size: 12.5px; font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Monaco, Consolas, monospace; }
    [data-theme="dark"] .message-bubble code { background: rgba(255,255,255,0.1); }
    .message.user .message-bubble code { background: rgba(255,255,255,0.2); color: white; }
    .message-bubble pre { background: var(--code-bg); padding: 14px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
    .message-bubble pre code { background: none; padding: 0; font-size: 13px; }
    .message-bubble a { color: var(--accent); text-decoration: none; }
    .message-bubble a:hover { text-decoration: underline; }
    .message.user .message-bubble a { color: rgba(255,255,255,0.85); }
    .message-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); }
    .message-bubble table { border-collapse: collapse; margin: 12px 0; width: 100%; font-size: 13px; }
    .message-bubble th, .message-bubble td { border: 1px solid var(--border); padding: 7px 11px; text-align: left; }
    .message-bubble th { background: var(--bg-secondary); font-weight: 600; }
    .message-bubble hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* D4: Verdict badges */
    .verdict-badge {
      display: inline-block; padding: 3px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    }
    .verdict-ootb    { background: #dcfce7; color: #16a34a; }
    .verdict-config  { background: #dbeafe; color: #1d4ed8; }
    .verdict-custom  { background: #fef3c7; color: #b45309; }
    .verdict-not-feasible { background: #fee2e2; color: #b91c1c; }
    [data-theme="dark"] .verdict-ootb    { background: rgba(22,163,74,0.2);  color: #4ade80; }
    [data-theme="dark"] .verdict-config  { background: rgba(29,78,216,0.2);  color: #60a5fa; }
    [data-theme="dark"] .verdict-custom  { background: rgba(180,83,9,0.25);  color: #fbbf24; }
    [data-theme="dark"] .verdict-not-feasible { background: rgba(185,28,28,0.2); color: #f87171; }

    /* D5: Reference cards */
    .ref-card {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 13px; border: 1px solid var(--border); border-radius: 8px;
      text-decoration: none !important; color: var(--text-primary) !important;
      background: var(--bg-secondary); margin: 5px 0; transition: border-color 0.15s, background 0.15s;
    }
    .ref-card:hover { border-color: var(--accent); background: var(--bg-hover); text-decoration: none !important; }
    .ref-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .ref-info { display: flex; flex-direction: column; min-width: 0; }
    .ref-title { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ref-domain { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    /* Hide the bullets wrapping ref cards */
    .message-bubble li:has(.ref-card) { list-style: none; padding-left: 0; }
    .message-bubble ul:has(.ref-card) { padding-left: 0; }

    /* D6: Escalation banner */
    .escalation-banner {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-top: 12px; padding: 10px 14px;
      background: #fefce8; border: 1px solid #fde047; border-radius: 8px;
      color: #713f12; font-size: 13px; font-weight: 500;
    }
    [data-theme="dark"] .escalation-banner {
      background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--warning);
    }
    .escalation-copy-btn {
      background: rgba(113,63,18,0.1); border: 1px solid rgba(113,63,18,0.2);
      border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px;
      font-weight: 500; color: #713f12; white-space: nowrap; flex-shrink: 0; font-family: inherit;
    }
    [data-theme="dark"] .escalation-copy-btn { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3); color: var(--warning); }
    .escalation-copy-btn:hover { background: rgba(113,63,18,0.2); }

    .skill-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .skill-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: rgba(99,102,241,0.1); color: #4f46e5; font-weight: 500; }
    [data-theme="dark"] .skill-badge { background: rgba(59,130,246,0.15); color: var(--accent); }

    /* Skill active banner */
    .skill-banner { display: flex; align-items: center; gap: 8px; padding: 7px 13px; margin-bottom: 8px; background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2); border-radius: 8px; font-size: 12px; color: #4f46e5; }
    [data-theme="dark"] .skill-banner { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.25); color: #c4b5fd; }
    .skill-banner-icon { font-size: 14px; }
    .skill-banner-name { font-weight: 600; }
    .skill-banner-desc { color: var(--text-muted); }
    .skill-banner-triggers { margin-left: auto; display: flex; gap: 4px; flex-wrap: wrap; }
    .skill-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(99,102,241,0.12); color: #4f46e5; font-family: monospace; white-space: nowrap; }
    .skill-tag-always { background: rgba(22,163,74,0.1); color: #16a34a; font-family: inherit; }
    .skill-tag-semantic { background: rgba(14,165,233,0.1); color: #0284c7; font-family: inherit; font-style: italic; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    [data-theme="dark"] .skill-tag { background: rgba(139,92,246,0.15); color: #c4b5fd; }
    [data-theme="dark"] .skill-tag-always { background: rgba(34,197,94,0.1); color: #4ade80; }
    [data-theme="dark"] .skill-tag-semantic { background: rgba(56,189,248,0.1); color: #38bdf8; }

    /* Collapsible long messages */
    .message-bubble.collapsed { max-height: 420px; overflow: hidden; position: relative; }
    .message-bubble.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(transparent, var(--bg)); pointer-events: none; }
    .message.user .message-bubble.collapsed::after { background: linear-gradient(transparent, var(--bg-user-msg)); }
    .expand-toggle { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--accent); cursor: pointer; border: none; background: none; font-family: inherit; padding: 0; }
    .expand-toggle:hover { text-decoration: underline; }

    /* Thinking indicator */
    .thinking { display: flex; align-items: center; gap: 10px; padding: 13px 17px; background: var(--bg-secondary); border-radius: var(--radius); font-size: 14px; color: var(--text-secondary); }
    .thinking-dots { display: flex; gap: 4px; }
    .thinking-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

    /* Tool activity indicators */
    .tool-indicators { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .tool-indicator { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); padding: 3px 0; line-height: 1.4; }
    .tool-indicator.done .tool-icon { color: var(--success); }
    .tool-indicator.error .tool-icon { color: var(--danger); }
    .tool-icon { width: 16px; text-align: center; flex-shrink: 0; }
    .tool-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tool-label { color: var(--text-secondary); }
    .tool-result { color: var(--text-muted); margin-left: 4px; }
    .tool-result a { color: var(--accent); text-decoration: none; }
    .tool-result a:hover { text-decoration: underline; }

    /* Collapsible tool group */
    .tool-group-header { cursor: pointer; font-size: 12px; color: var(--text-muted); padding: 5px 0; user-select: none; display: flex; align-items: center; gap: 6px; }
    .tool-group-header:hover { color: var(--text-secondary); }
    .tool-group-header .arrow { transition: transform 0.15s; display: inline-block; }
    .tool-group-header.collapsed .arrow { transform: rotate(-90deg); }
    .tool-group-body { transition: max-height 0.2s ease; overflow: hidden; }
    .tool-group-body.collapsed { max-height: 0 !important; }

    /* Activity pulse bar */
    .activity-bar { height: 2px; border-radius: 2px; margin: 8px 0 4px; background: linear-gradient(90deg, transparent, var(--accent), transparent); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Inline between-turn status */
    .inline-status { font-size: 12px; color: var(--text-muted); padding: 5px 0; display: flex; align-items: center; gap: 8px; }
    .inline-status .tool-spinner { width: 10px; height: 10px; }

    /* Code block download bar */
    .code-block-wrapper { position: relative; margin: 12px 0; }
    .code-download-bar { display: flex; justify-content: space-between; align-items: center; background: var(--code-bg-header); padding: 6px 14px; border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; font-size: 12px; color: var(--text-secondary); }
    .code-download-bar + pre { margin-top: 0; border-radius: 0 0 8px 8px; }
    .download-btn { background: rgba(0,102,204,0.1); color: var(--accent); border: none; border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; }
    .download-btn:hover { background: rgba(0,102,204,0.2); }

    /* File upload chips */
    .file-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; max-width: 800px; margin: 0 auto 8px; padding: 0 24px; }
    .file-chips:empty { display: none; }
    .file-chip { display: flex; align-items: center; gap: 6px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--text-secondary); }
    .file-chip-remove { cursor: pointer; color: var(--text-muted); font-size: 14px; border: none; background: none; }
    .file-chip-remove:hover { color: var(--danger); }
    .file-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .file-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-muted); }

    /* Attach button */
    .attach-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 10px; font-size: 20px; border-radius: 8px; transition: color 0.15s; }
    .attach-btn:hover { color: var(--text-primary); }

    /* ─── Input Area ──────────────────────────── */
    .input-area { border-top: 1px solid var(--border); padding: 14px 24px 18px; background: var(--bg); }
    .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
    .input-wrapper textarea { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 15px; color: var(--text-primary); font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 160px; line-height: 1.5; outline: none; transition: border-color 0.15s; }
    .input-wrapper textarea:focus { border-color: var(--accent); }
    .input-wrapper textarea::placeholder { color: var(--text-muted); }
    .send-btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 768px) { .sidebar { display: none; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px">
      <span id="userEmail" style="font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <a href="/api/auth/logout" style="font-size:12px;color:var(--text-muted);text-decoration:none">Sign out</a>
    </div>
  </aside>

  <main class="main">
    <!-- D1/D2: Chat header with title and dark mode toggle -->
    <header class="chat-header">
      <span class="chat-title">Capillary Solution Agent</span>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
    </header>

    <!-- D3: Phase indicator bar (hidden until agent starts) -->
    <div id="phase-bar" class="phase-bar" hidden>
      <div class="phase-step" data-phase="understand"><span class="phase-dot">○</span> Understanding</div>
      <div class="phase-sep">→</div>
      <div class="phase-step" data-phase="research"><span class="phase-dot">○</span> Researching</div>
      <div class="phase-sep">→</div>
      <div class="phase-step" data-phase="synthesise"><span class="phase-dot">○</span> Synthesising</div>
    </div>

    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner">
        <div class="welcome" id="welcome">
          <h1>Capillary Solution Agent</h1>
          <p>Paste a Jira ticket ID or describe your problem. I'll search Jira, Confluence, and Capillary docs to deliver a structured feasibility assessment.</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="file-chips" id="fileChips"></div>
      <div class="input-wrapper">
        <input type="file" id="fileInput" multiple accept=".pdf,.txt,.md,.png,.jpg,.jpeg,.gif,.webp" hidden>
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach files">&#x1F4CE;</button>
        <textarea id="input" placeholder="Describe your problem or paste a Jira ticket ID..." rows="1" autofocus></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </main>

<script>
// ─── Theme (D1) ──────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next === 'dark' ? 'dark' : '');
  if (next === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
// Init toggle button state
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') document.getElementById('themeToggle').textContent = '☀️';
})();

// ─── State ───────────────────────────────────────────────────────────────────
let currentConvId = null;
let isStreaming = false;
let pendingFiles = [];

const $ = (sel) => document.querySelector(sel);
const $input = $('#input');
const $sendBtn = $('#sendBtn');
const $messages = $('#messages');
const $inner = $('#messagesInner');
const $convList = $('#convList');
const $fileChips = $('#fileChips');
const $fileInput = $('#fileInput');
const $phaseBar = $('#phase-bar');

// ─── Init ────────────────────────────────────────────────────────────────────
loadConversations();
(async () => {
  try {
    const r = await fetch('/api/auth/me');
    if (!r.ok) { window.location.href = '/login.html'; return; }
    const { email } = await r.json();
    const el = document.getElementById('userEmail');
    if (el) el.textContent = email;
  } catch { /* ignore network errors */ }
})();

// ─── Input handling ──────────────────────────────────────────────────────────
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
});

// ─── File input handling ─────────────────────────────────────────────────────
$fileInput.addEventListener('change', () => {
  for (const f of $fileInput.files) {
    if (f.size > 10 * 1024 * 1024) { alert(`File "${f.name}" exceeds 10MB limit`); continue; }
    if (!pendingFiles.some(p => p.name === f.name && p.size === f.size)) pendingFiles.push(f);
  }
  $fileInput.value = '';
  renderFileChips();
});
function renderFileChips() {
  $fileChips.innerHTML = pendingFiles.map((f, i) => `
    <div class="file-chip"><span>${escapeHtml(f.name)}</span>
    <button class="file-chip-remove" onclick="removeFile(${i})">&times;</button></div>`).join('');
}
function removeFile(i) { pendingFiles.splice(i, 1); renderFileChips(); }

// ─── Phase bar (D3) ──────────────────────────────────────────────────────────
const PHASE_ORDER = ['understand', 'research', 'synthesise'];
function showPhaseBar() { $phaseBar.hidden = false; }
function hidePhaseBar() {
  $phaseBar.hidden = true;
  $phaseBar.querySelectorAll('.phase-step').forEach(s => {
    s.classList.remove('active', 'done');
    s.querySelector('.phase-dot').textContent = '○';
  });
}
function setPhase(name) {
  showPhaseBar();
  const activeIdx = PHASE_ORDER.indexOf(name);
  $phaseBar.querySelectorAll('.phase-step').forEach(step => {
    const stepIdx = PHASE_ORDER.indexOf(step.dataset.phase);
    const dot = step.querySelector('.phase-dot');
    if (stepIdx < activeIdx) {
      step.classList.remove('active'); step.classList.add('done'); dot.textContent = '✓';
    } else if (stepIdx === activeIdx) {
      step.classList.add('active'); step.classList.remove('done'); dot.textContent = '●';
    } else {
      step.classList.remove('active', 'done'); dot.textContent = '○';
    }
  });
}

// ─── API helpers ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(`/api${path}`, opts);
  if (!res.ok) { const err = await res.json().catch(() => ({ error: res.statusText })); throw new Error(err.error || 'Request failed'); }
  return res;
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
async function loadConversations() {
  const res = await api('GET', '/conversations');
  renderSidebar(await res.json());
}
function renderSidebar(convs) {
  $convList.innerHTML = convs.map(c => `
    <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="loadConversation('${c.id}')">
      <div class="conv-item-text">
        <div class="conv-item-title">${escapeHtml(c.title)}</div>
        <div class="conv-item-date">${timeAgo(c.updatedAt)}</div>
      </div>
      <button class="conv-delete" onclick="event.stopPropagation(); deleteConversation('${c.id}')" title="Delete">&#x2715;</button>
    </div>`).join('');
}
async function loadConversation(id) {
  currentConvId = id;
  const res = await api('GET', `/conversations/${id}`);
  const conv = await res.json();
  renderMessages(conv.messages);
  loadConversations();
  $input.focus();
}
async function deleteConversation(id) {
  await api('DELETE', `/conversations/${id}`);
  if (currentConvId === id) { currentConvId = null; renderMessages([]); }
  loadConversations();
}
function newChat() { currentConvId = null; renderMessages([]); $input.focus(); }

// ─── Message rendering ────────────────────────────────────────────────────────
function renderMessages(messages) {
  if (!messages.length) {
    $inner.innerHTML = `<div class="welcome" id="welcome"><h1>Capillary Solution Agent</h1><p>Paste a Jira ticket ID or describe your problem. I'll search Jira, Confluence, and Capillary docs to deliver a structured feasibility assessment.</p></div>`;
    return;
  }
  $inner.innerHTML = messages.map(m => renderMessage(m)).join('');
  $inner.querySelectorAll('.message.assistant .message-bubble').forEach(bubble => {
    postProcessCodeBlocks(bubble);
    postProcessVerdictBadges(bubble);
    postProcessReferenceCards(bubble);
  });
  applyCollapsible($inner);
  scrollToBottom();
}

function renderMessage(msg) {
  const isUser = msg.role === 'user';
  let html = `<div class="message ${msg.role}">`;
  html += `<div class="message-role">${isUser ? 'You' : 'Agent'}</div>`;
  if (isUser) {
    html += `<div class="message-bubble">${escapeHtml(msg.content)}</div>`;
    if (msg.files?.length) html += `<div class="file-badges">${msg.files.map(f => `<span class="file-badge">${escapeHtml(f)}</span>`).join('')}</div>`;
  } else {
    if (msg.skillsUsed?.length) {
      html += msg.skillsUsed.map(s => `<div class="skill-banner"><span class="skill-banner-icon">🧩</span><span class="skill-banner-name">${escapeHtml(s)}</span></div>`).join('');
    }
    html += `<div class="message-bubble">${marked.parse(msg.content || '')}</div>`;
    if (msg.escalated) html += buildEscalationBanner();
  }
  html += '</div>';
  return html;
}

function buildEscalationBanner() {
  return `<div class="escalation-banner"><span>⚠ SA Escalation Recommended</span><button class="escalation-copy-btn" onclick="copyEscalation(this)">Copy summary</button></div>`;
}

// D6: Copy escalation summary
function copyEscalation(btn) {
  const bubble = btn.closest('.message')?.querySelector('.message-bubble');
  const text = bubble?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy summary', 2000);
  }).catch(() => {
    btn.textContent = 'Failed';
    setTimeout(() => btn.textContent = 'Copy summary', 2000);
  });
}

// ─── Post-processing: Verdict badges (D4) ────────────────────────────────────
const VERDICTS = [
  { key: 'Not Feasible', cls: 'verdict-not-feasible' },
  { key: 'Custom',       cls: 'verdict-custom' },
  { key: 'Config',       cls: 'verdict-config' },
  { key: 'OOTB',         cls: 'verdict-ootb' },
];
function postProcessVerdictBadges(bubble) {
  const headers = bubble.querySelectorAll('h2');
  for (const h2 of headers) {
    if (h2.textContent.trim() !== 'Verdict') continue;
    let el = h2.nextElementSibling;
    while (el && el.tagName !== 'H2' && el.tagName !== 'H1') {
      const text = el.textContent;
      for (const { key, cls } of VERDICTS) {
        if (text.includes(key)) {
          // Escape the key for use in a regex (handle "Not Feasible" with space)
          const escaped = key.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
          el.innerHTML = el.innerHTML.replace(
            new RegExp(`(^|[\\s>])(${escaped})([\\s<.,!]|$)`, 'g'),
            `$1<span class="verdict-badge ${cls}">${key}</span>$3`
          );
          break;
        }
      }
      el = el.nextElementSibling;
    }
    break;
  }
}

// ─── Post-processing: Reference cards (D5) ───────────────────────────────────
function postProcessReferenceCards(bubble) {
  const headers = bubble.querySelectorAll('h2');
  for (const h2 of headers) {
    if (h2.textContent.trim() !== 'References') continue;
    let el = h2.nextElementSibling;
    while (el && el.tagName !== 'H2' && el.tagName !== 'H1') {
      el.querySelectorAll('a[href]').forEach(link => {
        const url = link.href;
        const title = link.textContent.trim() || url;
        link.className = 'ref-card';
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener');
        link.innerHTML = `<span class="ref-icon">${refIcon(url)}</span><span class="ref-info"><span class="ref-title">${escapeHtml(title)}</span><span class="ref-domain">${escapeHtml(refDomain(url))}</span></span>`;
      });
      el = el.nextElementSibling;
    }
    break;
  }
}
function refDomain(url) {
  try { return new URL(url).hostname; } catch { return url; }
}
function refIcon(url) {
  if (url.includes('atlassian.net/wiki')) return '📄';
  if (url.includes('atlassian.net/browse') || url.includes('/jira/')) return '🎫';
  if (url.includes('docs.capillarytech.com')) return '📚';
  return '🔗';
}

// ─── Send message + SSE streaming ────────────────────────────────────────────
async function sendMessage() {
  const text = $input.value.trim();
  if ((!text && !pendingFiles.length) || isStreaming) return;

  isStreaming = true;
  $sendBtn.disabled = true;
  $input.value = '';
  $input.style.height = 'auto';
  const filesToSend = [...pendingFiles];
  pendingFiles = [];
  renderFileChips();

  // Show phase bar immediately when agent starts
  showPhaseBar();

  try {
    if (!currentConvId) {
      const res = await api('POST', '/conversations', { message: text || filesToSend[0]?.name || 'File upload' });
      currentConvId = (await res.json()).id;
    }

    removeWelcome();
    const fileNames = filesToSend.map(f => f.name);
    let userHtml = `<div class="message user"><div class="message-role">You</div><div class="message-bubble">${escapeHtml(text || '(attached files)')}</div>`;
    if (fileNames.length) userHtml += `<div class="file-badges">${fileNames.map(f => `<span class="file-badge">${escapeHtml(f)}</span>`).join('')}</div>`;
    userHtml += '</div>';
    $inner.insertAdjacentHTML('beforeend', userHtml);
    scrollToBottom();

    const thinkingEl = document.createElement('div');
    thinkingEl.className = 'message assistant';
    thinkingEl.id = 'thinking';
    thinkingEl.innerHTML = `<div class="message-role">Agent</div><div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div><span class="thinking-text">Thinking...</span></div>`;
    $inner.appendChild(thinkingEl);
    scrollToBottom();

    let fetchOpts;
    if (filesToSend.length) {
      const formData = new FormData();
      formData.append('content', text);
      filesToSend.forEach(f => formData.append('files', f));
      fetchOpts = { method: 'POST', body: formData };
    } else {
      fetchOpts = { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: text }) };
    }

    const response = await fetch(`/api/conversations/${currentConvId}/messages`, fetchOpts);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    let streamingBubble = null;
    let streamingMsgDiv = null;
    let currentToolGroup = null;
    let activityBar = null;
    let inlineStatusEl = null;
    let accumulatedText = '';
    let renderTimeout = null;
    let lastBlockType = null;

    function ensureMsgContainer() {
      if (streamingMsgDiv) return;
      thinkingEl.remove();
      streamingMsgDiv = document.createElement('div');
      streamingMsgDiv.className = 'message assistant';
      streamingMsgDiv.innerHTML = '<div class="message-role">Agent</div>';
      $inner.appendChild(streamingMsgDiv);
      activityBar = document.createElement('div');
      activityBar.className = 'activity-bar';
      streamingMsgDiv.appendChild(activityBar);
    }
    function removeActivityBar() { if (activityBar) { activityBar.remove(); activityBar = null; } }
    function showInlineStatus(txt) {
      ensureMsgContainer();
      if (!inlineStatusEl) {
        inlineStatusEl = document.createElement('div');
        inlineStatusEl.className = 'inline-status';
        if (activityBar) streamingMsgDiv.insertBefore(inlineStatusEl, activityBar);
        else streamingMsgDiv.appendChild(inlineStatusEl);
      }
      inlineStatusEl.innerHTML = '<span class="tool-spinner"></span>' + escapeHtml(txt);
      scrollToBottom();
    }
    function removeInlineStatus() { if (inlineStatusEl) { inlineStatusEl.remove(); inlineStatusEl = null; } }
    function getToolGroup() {
      if (lastBlockType === 'text' || !currentToolGroup) {
        ensureMsgContainer(); removeInlineStatus();
        currentToolGroup = document.createElement('div');
        currentToolGroup.className = 'tool-indicators';
        if (activityBar) streamingMsgDiv.insertBefore(currentToolGroup, activityBar);
        else streamingMsgDiv.appendChild(currentToolGroup);
        lastBlockType = 'tool';
      }
      return currentToolGroup;
    }
    function collapseToolGroup(group) {
      if (!group || group.querySelector('.tool-group-header')) return;
      const pills = [...group.children];
      if (!pills.length) return;
      const header = document.createElement('div');
      header.className = 'tool-group-header collapsed';
      header.innerHTML = '<span class="arrow">▾</span> <span>' + pills.length + ' lookup(s) completed</span>';
      const body = document.createElement('div');
      body.className = 'tool-group-body collapsed';
      pills.forEach(p => body.appendChild(p));
      body.style.maxHeight = body.scrollHeight + 'px';
      group.appendChild(header);
      group.appendChild(body);
      header.onclick = () => { header.classList.toggle('collapsed'); body.classList.toggle('collapsed'); };
    }
    function getStreamingBubble() {
      if (lastBlockType === 'tool' || !streamingBubble) {
        ensureMsgContainer(); removeInlineStatus();
        if (currentToolGroup) collapseToolGroup(currentToolGroup);
        streamingBubble = document.createElement('div');
        streamingBubble.className = 'message-bubble';
        if (activityBar) streamingMsgDiv.insertBefore(streamingBubble, activityBar);
        else streamingMsgDiv.appendChild(streamingBubble);
        lastBlockType = 'text';
      }
      return streamingBubble;
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          const data = JSON.parse(line.slice(6));

          if (eventType === 'status') {
            const thinkText = thinkingEl.querySelector('.thinking-text');
            if (thinkText) thinkText.textContent = data.text;
            else if (streamingMsgDiv) showInlineStatus(data.text);

          } else if (eventType === 'phase') {
            // D3: Update phase bar
            setPhase(data.name);

          } else if (eventType === 'skill_active') {
            ensureMsgContainer();
            const banner = document.createElement('div');
            banner.className = 'skill-banner';
            const triggerHtml = data.alwaysOn
              ? '<span class="skill-tag skill-tag-always">always-on</span>'
              : data.reason
                ? `<span class="skill-tag skill-tag-semantic" title="${escapeHtml(data.reason)}">${escapeHtml(data.reason)}</span>`
                : (data.triggers || []).map(t => `<span class="skill-tag">"${escapeHtml(t)}"</span>`).join('');
            banner.innerHTML = `<span class="skill-banner-icon">🧩</span><span class="skill-banner-name">${escapeHtml(data.id)}</span><span class="skill-banner-desc">${escapeHtml(data.description)}</span>${triggerHtml ? `<span class="skill-banner-triggers">${triggerHtml}</span>` : ''}`;
            if (activityBar) streamingMsgDiv.insertBefore(banner, activityBar);
            else streamingMsgDiv.appendChild(banner);
            scrollToBottom();

          } else if (eventType === 'tool_status') {
            const group = getToolGroup();
            let toolEl = group.querySelector(`[data-tool-id="${data.id}"]`);
            if (data.status === 'running') {
              const label = toolDisplayLabel(data.name, data.inputSummary, 'running');
              if (toolEl) {
                toolEl.querySelector('.tool-label').textContent = label;
              } else {
                toolEl = document.createElement('div');
                toolEl.className = 'tool-indicator running';
                toolEl.dataset.toolId = data.id;
                toolEl.innerHTML = `<span class="tool-icon"><span class="tool-spinner"></span></span><span class="tool-label">${escapeHtml(label)}</span>`;
                group.appendChild(toolEl);
              }
              scrollToBottom();
            } else if (toolEl) {
              const isDone = data.status === 'done';
              toolEl.className = `tool-indicator ${isDone ? 'done' : 'error'}`;
              const label = toolDisplayLabel(data.name, data.inputSummary, data.status);
              let resultHtml = '';
              if (data.text) resultHtml = data.url
                ? ` — <a href="${escapeHtml(data.url)}" target="_blank" rel="noopener">${escapeHtml(data.text)}</a>`
                : ` — ${escapeHtml(data.text)}`;
              if (data.links?.length) {
                resultHtml += ` [${data.links.map(l => `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.label)}</a>`).join(', ')}]`;
              }
              toolEl.innerHTML = `<span class="tool-icon">${isDone ? '✓' : '✗'}</span><span class="tool-label">${escapeHtml(label)}</span><span class="tool-result">${resultHtml}</span>`;
              scrollToBottom();
            }

          } else if (eventType === 'token') {
            getStreamingBubble();
            accumulatedText += data.text;
            if (!renderTimeout) {
              renderTimeout = setTimeout(() => {
                streamingBubble.innerHTML = marked.parse(accumulatedText);
                scrollToBottom();
                renderTimeout = null;
              }, 80);
            }

          } else if (eventType === 'message') {
            if (renderTimeout) { clearTimeout(renderTimeout); renderTimeout = null; }
            thinkingEl.remove();
            removeInlineStatus(); removeActivityBar();
            if (currentToolGroup) collapseToolGroup(currentToolGroup);
            hidePhaseBar(); // D3: hide on completion
            if (streamingMsgDiv) {
              const bubble = getStreamingBubble();
              bubble.innerHTML = marked.parse(data.content || accumulatedText);
              postProcessCodeBlocks(bubble);
              postProcessVerdictBadges(bubble);   // D4
              postProcessReferenceCards(bubble);   // D5
              applyCollapsible(streamingMsgDiv);
              if (data.escalated) streamingMsgDiv.insertAdjacentHTML('beforeend', buildEscalationBanner()); // D6
            } else {
              appendMessageToUI(data);
            }

          } else if (eventType === 'error') {
            if (renderTimeout) { clearTimeout(renderTimeout); renderTimeout = null; }
            thinkingEl.remove(); removeActivityBar(); removeInlineStatus();
            hidePhaseBar();
            if (streamingBubble) streamingBubble.innerHTML += `<div style="color:var(--danger);margin-top:12px">${escapeHtml(data.text)}</div>`;
            else appendErrorToUI(data.text);
          }
          eventType = null;
        }
      }
    }

    // Cleanup
    if (renderTimeout) { clearTimeout(renderTimeout); renderTimeout = null; }
    removeActivityBar(); removeInlineStatus();
    if (currentToolGroup) collapseToolGroup(currentToolGroup);
    if (streamingBubble && accumulatedText) {
      streamingBubble.innerHTML = marked.parse(accumulatedText);
      postProcessCodeBlocks(streamingBubble);
      postProcessVerdictBadges(streamingBubble);
      postProcessReferenceCards(streamingBubble);
    }
    thinkingEl.remove();
    loadConversations();

  } catch (err) {
    const t = document.getElementById('thinking');
    if (t) t.remove();
    hidePhaseBar();
    appendErrorToUI(err.message);
  } finally {
    isStreaming = false;
    $sendBtn.disabled = false;
    $input.focus();
  }
}

// ─── Collapsible long messages ────────────────────────────────────────────────
const COLLAPSE_THRESHOLD = 500;
function applyCollapsible(container) {
  container.querySelectorAll('.message .message-bubble').forEach(bubble => {
    if (bubble.dataset.collapsible) return;
    bubble.dataset.collapsible = '1';
    requestAnimationFrame(() => {
      if (bubble.scrollHeight > COLLAPSE_THRESHOLD) {
        bubble.classList.add('collapsed');
        const toggle = document.createElement('button');
        toggle.className = 'expand-toggle';
        toggle.textContent = 'Show more';
        toggle.onclick = () => {
          const isCollapsed = bubble.classList.toggle('collapsed');
          toggle.textContent = isCollapsed ? 'Show more' : 'Show less';
        };
        bubble.parentElement.insertBefore(toggle, bubble.nextSibling);
      }
    });
  });
}

// ─── Tool display labels ─────────────────────────────────────────────────────
function toolDisplayLabel(name, inputSummary, status) {
  const running = { get_jira_ticket: 'Fetching', search_jira: 'Searching Jira for', search_confluence: 'Searching Confluence for', get_confluence_page: 'Loading page', search_kapa_docs: 'Searching Kapa docs for', search_docs_site: 'Searching docs.capillarytech.com for', activate_skill: 'Loading skill', list_skills: 'Listing skills' };
  const done    = { get_jira_ticket: 'Fetched', search_jira: 'Searched Jira for', search_confluence: 'Searched Confluence for', get_confluence_page: 'Loaded page', search_kapa_docs: 'Searched Kapa docs for', search_docs_site: 'Searched docs for', activate_skill: 'Loaded skill', list_skills: 'Listed skills' };
  const verbs = status === 'running' ? running : done;
  const v = verbs[name] || (status === 'running' ? `Using ${name}` : `Used ${name}`);
  return inputSummary ? `${v} ${inputSummary}` : v;
}

// ─── Code block download ─────────────────────────────────────────────────────
const LANG_EXTENSIONS = { json:'json', javascript:'js', typescript:'ts', python:'py', java:'java', go:'go', rust:'rs', sql:'sql', yaml:'yml', yml:'yml', xml:'xml', html:'html', css:'css', markdown:'md', md:'md', csv:'csv', bash:'sh', shell:'sh', excalidraw:'excalidraw' };

function postProcessCodeBlocks(container) {
  container.querySelectorAll('pre').forEach(pre => {
    if (pre.parentElement.classList.contains('code-block-wrapper')) return;
    const code = pre.querySelector('code');
    if (!code) return;
    const langClass = [...(code.classList || [])].find(c => c.startsWith('language-'));
    const lang = langClass ? langClass.replace('language-', '') : '';
    const lineCount = (code.textContent || '').split('\n').length;
    if (!lang && lineCount < 20) return;
    const ext = LANG_EXTENSIONS[lang] || 'txt';
    const filename = `download.${ext}`;
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    pre.parentNode.insertBefore(wrapper, pre);
    const bar = document.createElement('div');
    bar.className = 'code-download-bar';
    bar.innerHTML = `<span>${escapeHtml(lang || 'code')}</span><button class="download-btn" onclick="downloadCodeBlock(this,'${escapeHtml(filename)}')">Download</button>`;
    wrapper.appendChild(bar);
    wrapper.appendChild(pre);
  });
}

function downloadCodeBlock(btn, filename) {
  const wrapper = btn.closest('.code-block-wrapper');
  const code = wrapper.querySelector('pre code') || wrapper.querySelector('pre');
  const blob = new Blob([code.textContent], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function appendMessageToUI(msg) {
  removeWelcome();
  $inner.insertAdjacentHTML('beforeend', renderMessage(msg));
  const bubble = $inner.querySelector('.message:last-child .message-bubble');
  if (bubble && msg.role === 'assistant') {
    postProcessCodeBlocks(bubble);
    postProcessVerdictBadges(bubble);
    postProcessReferenceCards(bubble);
  }
  scrollToBottom();
}

function appendErrorToUI(text) {
  removeWelcome();
  $inner.insertAdjacentHTML('beforeend', `<div class="message error"><div class="message-role">Agent</div><div class="message-bubble">${escapeHtml(text)}</div></div>`);
  scrollToBottom();
}

function removeWelcome() { const w = document.getElementById('welcome'); if (w) w.remove(); }
function scrollToBottom() { $messages.scrollTop = $messages.scrollHeight; }

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(iso).toLocaleDateString();
}
</script>
