<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capillary Solution Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-sidebar: #0f1629;
      --bg-input: #1e2a4a;
      --bg-user-msg: #2563eb;
      --bg-assistant-msg: #1e293b;
      --bg-hover: #1e2a4a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #1e293b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #22c55e;
      --radius: 12px;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      overflow: hidden;
    }

    /* ─── Sidebar ─────────────────────────────── */
    .sidebar {
      width: 280px; min-width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100vh;
    }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
    .new-chat-btn { width: 100%; padding: 10px 16px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.15s; }
    .new-chat-btn:hover { background: var(--accent-hover); }
    .conv-list { flex: 1; overflow-y: auto; padding: 8px; }
    .conv-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; transition: background 0.1s; }
    .conv-item:hover { background: var(--bg-hover); }
    .conv-item.active { background: var(--bg-hover); }
    .conv-item-text { flex: 1; min-width: 0; }
    .conv-item-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
    .conv-item-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .conv-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s; font-size: 16px; }
    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-delete:hover { color: var(--danger); }

    /* ─── Main Area ───────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 24px 0; }
    .messages-inner { max-width: 780px; margin: 0 auto; padding: 0 24px; }

    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 40px; }
    .welcome h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
    .welcome p { font-size: 15px; max-width: 460px; line-height: 1.6; }

    .message { margin-bottom: 24px; display: flex; flex-direction: column; }
    .message-role { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; color: var(--text-muted); }
    .message-bubble { padding: 14px 18px; border-radius: var(--radius); line-height: 1.65; font-size: 14px; }
    .message.user .message-bubble { background: var(--bg-user-msg); color: white; align-self: flex-end; max-width: 85%; }
    .message.assistant .message-bubble { background: var(--bg-assistant-msg); border: 1px solid var(--border); }
    .message.error .message-bubble { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); color: #fca5a5; }

    /* Markdown */
    .message-bubble h1, .message-bubble h2, .message-bubble h3 { margin: 16px 0 8px; line-height: 1.3; }
    .message-bubble h1 { font-size: 18px; } .message-bubble h2 { font-size: 16px; } .message-bubble h3 { font-size: 15px; }
    .message-bubble p { margin: 8px 0; }
    .message-bubble ul, .message-bubble ol { margin: 8px 0; padding-left: 24px; }
    .message-bubble li { margin: 4px 0; }
    .message-bubble code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', Monaco, Consolas, monospace; }
    .message-bubble pre { background: #0d1117; padding: 14px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
    .message-bubble pre code { background: none; padding: 0; font-size: 13px; }
    .message-bubble a { color: var(--accent); text-decoration: none; }
    .message-bubble a:hover { text-decoration: underline; }
    .message-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); }
    .message-bubble table { border-collapse: collapse; margin: 12px 0; width: 100%; }
    .message-bubble th, .message-bubble td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; font-size: 13px; }
    .message-bubble th { background: rgba(255,255,255,0.05); font-weight: 600; }

    .skill-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .skill-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: rgba(59, 130, 246, 0.15); color: var(--accent); font-weight: 500; }
    .escalation-banner { margin-top: 8px; padding: 8px 12px; background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 8px; color: var(--warning); font-size: 13px; }

    /* Skill active banner */
    .skill-banner { display: flex; align-items: center; gap: 8px; padding: 8px 14px; margin-bottom: 10px; background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 8px; font-size: 12px; color: #c4b5fd; }
    .skill-banner-icon { font-size: 14px; }
    .skill-banner-name { font-weight: 600; color: #ddd6fe; }
    .skill-banner-desc { color: #a78bfa; }

    /* Collapsible long messages */
    .message-bubble.collapsed { max-height: 400px; overflow: hidden; position: relative; }
    .message-bubble.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(transparent, var(--bg-assistant-msg)); pointer-events: none; }
    .message.user .message-bubble.collapsed::after { background: linear-gradient(transparent, var(--bg-user-msg)); }
    .expand-toggle { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--accent); cursor: pointer; border: none; background: none; font-family: inherit; padding: 0; }
    .expand-toggle:hover { text-decoration: underline; }

    /* Thinking indicator */
    .thinking { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: var(--bg-assistant-msg); border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; color: var(--text-secondary); }
    .thinking-dots { display: flex; gap: 4px; }
    .thinking-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

    /* Tool activity indicators */
    .tool-indicators { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .tool-indicator { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); padding: 4px 0; line-height: 1.4; }
    .tool-indicator.done .tool-icon { color: var(--success); }
    .tool-indicator.error .tool-icon { color: var(--danger); }
    .tool-icon { width: 16px; text-align: center; flex-shrink: 0; }
    .tool-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tool-label { color: var(--text-secondary); }
    .tool-result { color: var(--text-muted); margin-left: 4px; }
    .tool-result a { color: var(--accent); text-decoration: none; }
    .tool-result a:hover { text-decoration: underline; }

    /* Collapsible tool group */
    .tool-group-header { cursor: pointer; font-size: 12px; color: var(--text-muted); padding: 6px 0; user-select: none; display: flex; align-items: center; gap: 6px; }
    .tool-group-header:hover { color: var(--text-secondary); }
    .tool-group-header .arrow { transition: transform 0.15s; display: inline-block; }
    .tool-group-header.collapsed .arrow { transform: rotate(-90deg); }
    .tool-group-body { transition: max-height 0.2s ease; overflow: hidden; }
    .tool-group-body.collapsed { max-height: 0 !important; }

    /* Activity pulse bar */
    .activity-bar { height: 3px; border-radius: 2px; margin: 10px 0 4px; background: linear-gradient(90deg, transparent, var(--accent), transparent); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Inline between-turn status */
    .inline-status { font-size: 12px; color: var(--text-muted); padding: 6px 0; display: flex; align-items: center; gap: 8px; }
    .inline-status .tool-spinner { width: 10px; height: 10px; }

    /* Code block download bar */
    .code-block-wrapper { position: relative; margin: 12px 0; }
    .code-download-bar { display: flex; justify-content: space-between; align-items: center; background: #161b22; padding: 6px 14px; border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; font-size: 12px; color: var(--text-secondary); }
    .code-download-bar + pre { margin-top: 0; border-radius: 0 0 8px 8px; }
    .download-btn { background: rgba(59,130,246,0.15); color: var(--accent); border: none; border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 12px; font-weight: 500; }
    .download-btn:hover { background: rgba(59,130,246,0.3); }

    /* File upload chips */
    .file-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; max-width: 780px; margin: 0 auto 8px; padding: 0 24px; }
    .file-chips:empty { display: none; }
    .file-chip { display: flex; align-items: center; gap: 6px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--text-secondary); }
    .file-chip-remove { cursor: pointer; color: var(--text-muted); font-size: 14px; border: none; background: none; }
    .file-chip-remove:hover { color: var(--danger); }
    .file-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .file-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: rgba(255,255,255,0.08); color: var(--text-muted); }

    /* Attach button */
    .attach-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 10px; font-size: 20px; border-radius: 8px; transition: color 0.15s; }
    .attach-btn:hover { color: var(--text-primary); }

    /* ─── Input Area ──────────────────────────── */
    .input-area { border-top: 1px solid var(--border); padding: 16px 24px 20px; }
    .input-wrapper { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
    .input-wrapper textarea { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; color: var(--text-primary); font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 160px; line-height: 1.5; outline: none; transition: border-color 0.15s; }
    .input-wrapper textarea:focus { border-color: var(--accent); }
    .input-wrapper textarea::placeholder { color: var(--text-muted); }
    .send-btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.15s; white-space: nowrap; }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 768px) { .sidebar { display: none; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)">
      <a href="/api/logout" style="font-size:12px;color:var(--text-muted);text-decoration:none">Sign out</a>
    </div>
  </aside>

  <main class="main">
    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner">
        <div class="welcome" id="welcome">
          <h1>Capillary Solution Agent</h1>
          <p>Paste a Jira ticket ID or describe your problem. I'll search Capillary docs, analyse gaps, and draft solutions.</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="file-chips" id="fileChips"></div>
      <div class="input-wrapper">
        <input type="file" id="fileInput" multiple accept=".pdf,.txt,.md,.png,.jpg,.jpeg,.gif,.webp" hidden>
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach files">&#x1F4CE;</button>
        <textarea id="input" placeholder="Describe your problem or paste a Jira ticket ID..." rows="1" autofocus></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </main>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentConvId = null;
let isStreaming = false;
let pendingFiles = [];

const $ = (sel) => document.querySelector(sel);
const $input = $('#input');
const $sendBtn = $('#sendBtn');
const $messages = $('#messages');
const $inner = $('#messagesInner');
const $convList = $('#convList');
const $fileChips = $('#fileChips');
const $fileInput = $('#fileInput');

// ─── Init ────────────────────────────────────────────────────────────────────
loadConversations();

// ─── Input handling ──────────────────────────────────────────────────────────
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
});

// ─── File input handling ─────────────────────────────────────────────────────
$fileInput.addEventListener('change', () => {
  for (const f of $fileInput.files) {
    if (f.size > 10 * 1024 * 1024) { alert(`File "${f.name}" exceeds 10MB limit`); continue; }
    if (!pendingFiles.some(p => p.name === f.name && p.size === f.size)) pendingFiles.push(f);
  }
  $fileInput.value = '';
  renderFileChips();
});

function renderFileChips() {
  $fileChips.innerHTML = pendingFiles.map((f, i) => `
    <div class="file-chip">
      <span>${escapeHtml(f.name)}</span>
      <button class="file-chip-remove" onclick="removeFile(${i})">&times;</button>
    </div>`).join('');
}
function removeFile(i) { pendingFiles.splice(i, 1); renderFileChips(); }

// ─── API helpers ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(`/api${path}`, opts);
  if (!res.ok) { const err = await res.json().catch(() => ({ error: res.statusText })); throw new Error(err.error || 'Request failed'); }
  return res;
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
async function loadConversations() {
  const res = await api('GET', '/conversations');
  renderSidebar(await res.json());
}
function renderSidebar(convs) {
  $convList.innerHTML = convs.map(c => `
    <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="loadConversation('${c.id}')">
      <div class="conv-item-text">
        <div class="conv-item-title">${escapeHtml(c.title)}</div>
        <div class="conv-item-date">${timeAgo(c.updatedAt)}</div>
      </div>
      <button class="conv-delete" onclick="event.stopPropagation(); deleteConversation('${c.id}')" title="Delete">&#x2715;</button>
    </div>`).join('');
}
async function loadConversation(id) {
  currentConvId = id;
  const res = await api('GET', `/conversations/${id}`);
  const conv = await res.json();
  renderMessages(conv.messages);
  loadConversations();
  $input.focus();
}
async function deleteConversation(id) {
  await api('DELETE', `/conversations/${id}`);
  if (currentConvId === id) { currentConvId = null; renderMessages([]); }
  loadConversations();
}
function newChat() { currentConvId = null; renderMessages([]); $input.focus(); }

// ─── Messages ────────────────────────────────────────────────────────────────
function renderMessages(messages) {
  if (!messages.length) {
    $inner.innerHTML = `<div class="welcome" id="welcome"><h1>Capillary Solution Agent</h1><p>Paste a Jira ticket ID or describe your problem. I'll search Capillary docs, analyse gaps, and draft solutions.</p></div>`;
    return;
  }
  $inner.innerHTML = messages.map(m => renderMessage(m)).join('');
  $inner.querySelectorAll('.message.assistant .message-bubble').forEach(postProcessCodeBlocks);
  applyCollapsible($inner);
  scrollToBottom();
}

function renderMessage(msg) {
  const isUser = msg.role === 'user';
  let html = `<div class="message ${msg.role}">`;
  html += `<div class="message-role">${isUser ? 'You' : 'Agent'}</div>`;
  if (isUser) {
    html += `<div class="message-bubble">${escapeHtml(msg.content)}</div>`;
    if (msg.files?.length) html += `<div class="file-badges">${msg.files.map(f => `<span class="file-badge">${escapeHtml(f)}</span>`).join('')}</div>`;
  } else {
    if (msg.skillsUsed?.length) {
      html += msg.skillsUsed.map(s => `<div class="skill-banner"><span class="skill-banner-icon">🧩</span><span class="skill-banner-name">${escapeHtml(s)}</span></div>`).join('');
    }
    html += `<div class="message-bubble">${marked.parse(msg.content || '')}</div>`;
    if (msg.escalated) html += `<div class="escalation-banner">This query has been flagged for SA review.</div>`;
  }
  html += '</div>';
  return html;
}

// ─── Send message + SSE streaming ────────────────────────────────────────────
async function sendMessage() {
  const text = $input.value.trim();
  if ((!text && !pendingFiles.length) || isStreaming) return;

  isStreaming = true;
  $sendBtn.disabled = true;
  $input.value = '';
  $input.style.height = 'auto';
  const filesToSend = [...pendingFiles];
  pendingFiles = [];
  renderFileChips();

  try {
    // Create conversation if needed
    if (!currentConvId) {
      const res = await api('POST', '/conversations', { message: text || filesToSend[0]?.name || 'File upload' });
      currentConvId = (await res.json()).id;
    }

    // Show user message
    removeWelcome();
    const fileNames = filesToSend.map(f => f.name);
    let userHtml = `<div class="message user"><div class="message-role">You</div><div class="message-bubble">${escapeHtml(text || '(attached files)')}</div>`;
    if (fileNames.length) userHtml += `<div class="file-badges">${fileNames.map(f => `<span class="file-badge">${escapeHtml(f)}</span>`).join('')}</div>`;
    userHtml += '</div>';
    $inner.insertAdjacentHTML('beforeend', userHtml);
    scrollToBottom();

    // Show thinking indicator
    const thinkingEl = document.createElement('div');
    thinkingEl.className = 'message assistant';
    thinkingEl.id = 'thinking';
    thinkingEl.innerHTML = `<div class="message-role">Agent</div><div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div><span class="thinking-text">Thinking...</span></div>`;
    $inner.appendChild(thinkingEl);
    scrollToBottom();

    // Build request — FormData if files, JSON otherwise
    let fetchOpts;
    if (filesToSend.length) {
      const formData = new FormData();
      formData.append('content', text);
      filesToSend.forEach(f => formData.append('files', f));
      fetchOpts = { method: 'POST', body: formData };
    } else {
      fetchOpts = { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: text }) };
    }

    const response = await fetch(`/api/conversations/${currentConvId}/messages`, fetchOpts);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    // Streaming state — elements are appended sequentially as events arrive
    let streamingBubble = null;
    let streamingMsgDiv = null;
    let currentToolGroup = null;
    let activityBar = null;
    let inlineStatusEl = null;
    let accumulatedText = '';
    let renderTimeout = null;
    let lastBlockType = null;

    function ensureMsgContainer() {
      if (streamingMsgDiv) return;
      thinkingEl.remove();
      streamingMsgDiv = document.createElement('div');
      streamingMsgDiv.className = 'message assistant';
      streamingMsgDiv.innerHTML = '<div class="message-role">Agent</div>';
      $inner.appendChild(streamingMsgDiv);
      // Add activity bar
      activityBar = document.createElement('div');
      activityBar.className = 'activity-bar';
      streamingMsgDiv.appendChild(activityBar);
    }

    function removeActivityBar() {
      if (activityBar) { activityBar.remove(); activityBar = null; }
    }

    function showInlineStatus(text) {
      ensureMsgContainer();
      if (!inlineStatusEl) {
        inlineStatusEl = document.createElement('div');
        inlineStatusEl.className = 'inline-status';
        // Insert before activity bar
        if (activityBar) streamingMsgDiv.insertBefore(inlineStatusEl, activityBar);
        else streamingMsgDiv.appendChild(inlineStatusEl);
      }
      inlineStatusEl.innerHTML = '<span class="tool-spinner"></span>' + escapeHtml(text);
      scrollToBottom();
    }

    function removeInlineStatus() {
      if (inlineStatusEl) { inlineStatusEl.remove(); inlineStatusEl = null; }
    }

    function getToolGroup() {
      if (lastBlockType === 'text' || !currentToolGroup) {
        ensureMsgContainer();
        removeInlineStatus();
        currentToolGroup = document.createElement('div');
        currentToolGroup.className = 'tool-indicators';
        // Insert before activity bar
        if (activityBar) streamingMsgDiv.insertBefore(currentToolGroup, activityBar);
        else streamingMsgDiv.appendChild(currentToolGroup);
        lastBlockType = 'tool';
      }
      return currentToolGroup;
    }

    function collapseToolGroup(group) {
      if (!group || group.querySelector('.tool-group-header')) return; // already collapsed
      const pills = [...group.children];
      if (!pills.length) return;
      const count = pills.length;
      const header = document.createElement('div');
      header.className = 'tool-group-header collapsed';
      header.innerHTML = '<span class="arrow">▾</span> <span class="tool-group-summary">' + count + ' lookup(s) completed</span>';
      const body = document.createElement('div');
      body.className = 'tool-group-body collapsed';
      pills.forEach(p => body.appendChild(p));
      body.style.maxHeight = body.scrollHeight + 'px';
      group.appendChild(header);
      group.appendChild(body);
      header.onclick = () => {
        header.classList.toggle('collapsed');
        body.classList.toggle('collapsed');
      };
    }

    function getStreamingBubble() {
      if (lastBlockType === 'tool' || !streamingBubble) {
        ensureMsgContainer();
        removeInlineStatus();
        // Collapse the previous tool group
        if (currentToolGroup) collapseToolGroup(currentToolGroup);
        streamingBubble = document.createElement('div');
        streamingBubble.className = 'message-bubble';
        if (activityBar) streamingMsgDiv.insertBefore(streamingBubble, activityBar);
        else streamingMsgDiv.appendChild(streamingBubble);
        lastBlockType = 'text';
      }
      return streamingBubble;
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          const data = JSON.parse(line.slice(6));

          if (eventType === 'status') {
            const thinkText = thinkingEl.querySelector('.thinking-text');
            if (thinkText) {
              thinkText.textContent = data.text;
            } else if (streamingMsgDiv) {
              // Thinking bubble is gone — show inline status
              showInlineStatus(data.text);
            }
          } else if (eventType === 'skill_active') {
            ensureMsgContainer();
            const banner = document.createElement('div');
            banner.className = 'skill-banner';
            banner.innerHTML = `<span class="skill-banner-icon">🧩</span><span class="skill-banner-name">${escapeHtml(data.id)}</span><span class="skill-banner-desc">${escapeHtml(data.description)}</span>`;
            streamingMsgDiv.appendChild(banner);
            scrollToBottom();
          } else if (eventType === 'tool_status') {
            const group = getToolGroup();
            const toolEl = group.querySelector(`[data-tool-id="${data.id}"]`);
            if (data.status === 'running') {
              const label = toolDisplayLabel(data.name, data.inputSummary, 'running');
              const pill = document.createElement('div');
              pill.className = 'tool-indicator running';
              pill.dataset.toolId = data.id;
              pill.innerHTML = `<span class="tool-icon"><span class="tool-spinner"></span></span><span class="tool-label">${escapeHtml(label)}</span>`;
              group.appendChild(pill);
              scrollToBottom();
            } else if (toolEl) {
              const isDone = data.status === 'done';
              toolEl.className = `tool-indicator ${isDone ? 'done' : 'error'}`;
              const icon = isDone ? '✓' : '✗';
              const label = toolDisplayLabel(data.name, data.inputSummary, data.status);
              // Build result with clickable links
              let resultHtml = '';
              if (data.text) {
                if (data.url) {
                  resultHtml = ` — <a href="${escapeHtml(data.url)}" target="_blank" rel="noopener">${escapeHtml(data.text)}</a>`;
                } else {
                  resultHtml = ` — ${escapeHtml(data.text)}`;
                }
              }
              if (data.links?.length) {
                const linkHtml = data.links.map(l => `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.label)}</a>`).join(', ');
                resultHtml += ` [${linkHtml}]`;
              }
              toolEl.innerHTML = `<span class="tool-icon">${icon}</span><span class="tool-label">${escapeHtml(label)}</span><span class="tool-result">${resultHtml}</span>`;
              scrollToBottom();
            }
          } else if (eventType === 'token') {
            getStreamingBubble();
            accumulatedText += data.text;
            if (!renderTimeout) {
              renderTimeout = setTimeout(() => {
                streamingBubble.innerHTML = marked.parse(accumulatedText);
                scrollToBottom();
                renderTimeout = null;
              }, 80);
            }
          } else if (eventType === 'message') {
            if (renderTimeout) { clearTimeout(renderTimeout); renderTimeout = null; }
            thinkingEl.remove();
            removeInlineStatus();
            removeActivityBar();
            if (currentToolGroup) collapseToolGroup(currentToolGroup);
            if (streamingMsgDiv) {
              const bubble = getStreamingBubble();
              bubble.innerHTML = marked.parse(data.content || accumulatedText);
              postProcessCodeBlocks(bubble);
              applyCollapsible(streamingMsgDiv);
              if (data.escalated) streamingMsgDiv.insertAdjacentHTML('beforeend', '<div class="escalation-banner">This query has been flagged for SA review.</div>');
            } else {
              appendMessageToUI(data);
            }
          } else if (eventType === 'error') {
            if (renderTimeout) { clearTimeout(renderTimeout); renderTimeout = null; }
            thinkingEl.remove();
            removeActivityBar();
            removeInlineStatus();
            if (streamingBubble) {
              streamingBubble.innerHTML += `<div style="color:#fca5a5;margin-top:12px">${escapeHtml(data.text)}</div>`;
            } else {
              appendErrorToUI(data.text);
            }
          }
          eventType = null;
        }
      }
    }

    // Cleanup
    if (renderTimeout) { clearTimeout(renderTimeout); renderTimeout = null; }
    removeActivityBar();
    removeInlineStatus();
    if (currentToolGroup) collapseToolGroup(currentToolGroup);
    if (streamingBubble && accumulatedText) {
      streamingBubble.innerHTML = marked.parse(accumulatedText);
      postProcessCodeBlocks(streamingBubble);
    }
    thinkingEl.remove();
    loadConversations();

  } catch (err) {
    const t = document.getElementById('thinking');
    if (t) t.remove();
    appendErrorToUI(err.message);
  } finally {
    isStreaming = false;
    $sendBtn.disabled = false;
    $input.focus();
  }
}

// ─── Collapsible long messages ────────────────────────────────────────────────
const COLLAPSE_THRESHOLD = 500; // px

function applyCollapsible(container) {
  container.querySelectorAll('.message .message-bubble').forEach(bubble => {
    if (bubble.dataset.collapsible) return; // already processed
    bubble.dataset.collapsible = '1';
    // Wait a frame for layout to settle
    requestAnimationFrame(() => {
      if (bubble.scrollHeight > COLLAPSE_THRESHOLD) {
        bubble.classList.add('collapsed');
        const toggle = document.createElement('button');
        toggle.className = 'expand-toggle';
        toggle.textContent = 'Show more';
        toggle.onclick = () => {
          const isCollapsed = bubble.classList.toggle('collapsed');
          toggle.textContent = isCollapsed ? 'Show more' : 'Show less';
        };
        bubble.parentElement.insertBefore(toggle, bubble.nextSibling);
      }
    });
  });
}

// ─── Tool display labels ─────────────────────────────────────────────────────
function toolDisplayLabel(name, inputSummary, status) {
  const verb = status === 'running' ? { get_jira_ticket: 'Fetching', search_jira: 'Searching Jira for', search_confluence: 'Searching Confluence for', get_confluence_page: 'Loading page' }
    : { get_jira_ticket: 'Fetched', search_jira: 'Searched Jira for', search_confluence: 'Searched Confluence for', get_confluence_page: 'Loaded page' };
  const v = (status === 'running' ? verb : verb)[name] || (status === 'running' ? `Using ${name}` : `Used ${name}`);
  return inputSummary ? `${v} ${inputSummary}` : v;
}

// ─── Code block download ─────────────────────────────────────────────────────
const LANG_EXTENSIONS = { json: 'json', javascript: 'js', typescript: 'ts', python: 'py', java: 'java', go: 'go', rust: 'rs', sql: 'sql', yaml: 'yml', yml: 'yml', xml: 'xml', html: 'html', css: 'css', markdown: 'md', md: 'md', csv: 'csv', bash: 'sh', shell: 'sh', excalidraw: 'excalidraw' };

function postProcessCodeBlocks(container) {
  container.querySelectorAll('pre').forEach(pre => {
    if (pre.parentElement.classList.contains('code-block-wrapper')) return; // already wrapped
    const code = pre.querySelector('code');
    if (!code) return;

    // Detect language from class
    const langClass = [...(code.classList || [])].find(c => c.startsWith('language-'));
    const lang = langClass ? langClass.replace('language-', '') : '';
    const lineCount = (code.textContent || '').split('\n').length;

    // Only add download bar for recognized languages or long blocks
    if (!lang && lineCount < 20) return;

    const ext = LANG_EXTENSIONS[lang] || 'txt';
    const filename = `download.${ext}`;
    const label = lang || 'code';

    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(document.createElement('div'));
    wrapper.firstChild.className = 'code-download-bar';
    wrapper.firstChild.innerHTML = `<span>${escapeHtml(label)}</span><button class="download-btn" onclick="downloadCodeBlock(this, '${escapeHtml(filename)}')">Download</button>`;
    wrapper.appendChild(pre);
  });
}

function downloadCodeBlock(btn, filename) {
  const wrapper = btn.closest('.code-block-wrapper');
  const code = wrapper.querySelector('pre code') || wrapper.querySelector('pre');
  const blob = new Blob([code.textContent], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function appendMessageToUI(msg) {
  removeWelcome();
  $inner.insertAdjacentHTML('beforeend', renderMessage(msg));
  const lastBubble = $inner.querySelector('.message:last-child .message-bubble');
  if (lastBubble && msg.role === 'assistant') postProcessCodeBlocks(lastBubble);
  scrollToBottom();
}

function appendErrorToUI(text) {
  removeWelcome();
  $inner.insertAdjacentHTML('beforeend', `<div class="message error"><div class="message-role">Agent</div><div class="message-bubble">${escapeHtml(text)}</div></div>`);
  scrollToBottom();
}

function removeWelcome() { const w = document.getElementById('welcome'); if (w) w.remove(); }
function scrollToBottom() { $messages.scrollTop = $messages.scrollHeight; }

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(iso).toLocaleDateString();
}
