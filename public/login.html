<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Solution Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b82f6'/><text x='16' y='22' font-family='system-ui,sans-serif' font-size='16' font-weight='700' fill='white' text-anchor='middle'>SA</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --border: #1e293b;
      --input-bg: #1e2a4a;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --divider: #2d3a55;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: #475569; }
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--divider);
    }
    .sso-btn {
      width: 100%;
      padding: 11px 14px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      text-decoration: none;
    }
    .sso-btn:hover { background: var(--input-bg); border-color: var(--accent); }
    .sso-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-text">Capillary</div>
    <div class="subtitle">Solution Agent</div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@capillarytech.com" autocomplete="email" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <div class="error-msg" id="error"></div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>

    <div id="ssoSection" style="display:none">
      <div class="divider">or continue with</div>

      <a href="/auth/google" class="sso-btn" id="googleBtn" style="display:none">
        <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </a>

      <a href="/auth/microsoft" class="sso-btn" id="microsoftBtn" style="display:none">
        <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022"/>
          <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00"/>
          <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF"/>
          <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900"/>
        </svg>
        Sign in with Microsoft
      </a>
    </div>

    <div class="footer">Capillary Technologies &mdash; Customer Success</div>
  </div>

<script>
(async () => {
  try {
    const res = await fetch('/api/auth/providers');
    if (!res.ok) return;
    const { google, microsoft } = await res.json();
    if (google) document.getElementById('googleBtn').style.display = 'flex';
    if (microsoft) document.getElementById('microsoftBtn').style.display = 'flex';
    if (google || microsoft) document.getElementById('ssoSection').style.display = 'block';
  } catch { /* silently hide SSO on network error */ }
})();

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('error');
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;

  error.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });

    if (res.ok) {
      window.location.href = '/';
    } else {
      const data = await res.json().catch(() => ({}));
      error.textContent = data.error || 'Invalid credentials.';
    }
  } catch {
    error.textContent = 'Connection error. Please try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
